<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>娇的好友专属解压小游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'ZCOOL KuaiLe', cursive; background-color: #FFF5E1; margin: 0; padding: 0; }
        .art-title {
            color: #f97316;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(249, 115, 22, 0.2);
            font-size: 2.2rem;
            line-height: 1.3;
        }
        /* 强制隐藏类 */
        .hidden-screen { display: none !important; }
        
        /* 像素女孩动画背景 */
        .girl-pixel { width: 35px; height: 50px; border-radius: 8px 8px 0 0; position: relative; transition: all 0.3s; }
        .girl-pixel:hover { transform: scale(1.1); }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 350px;
            margin: 0 auto;
        }
        .pixel-card {
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            border-bottom: 4px solid rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.2s;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-x-hidden">

    <div id="cover-page" class="w-full flex flex-col items-center justify-center text-center p-6">
        <h1 class="art-title mb-10 animate-pulse">娇的好友专属<br>解压小游戏</h1>
        
        <div class="relative w-72 h-40 bg-orange-100 rounded-3xl flex items-end justify-center gap-6 pb-4 border-4 border-white shadow-lg mb-12">
            <div class="girl-pixel bg-pink-400"></div>
            <div class="girl-pixel bg-orange-300"></div>
            <div class="girl-pixel bg-yellow-300"></div>
            <div class="absolute -top-6 bg-white px-4 py-1 rounded-full text-orange-600 text-sm font-bold shadow-md">“今天也要开开心心~”</div>
        </div>

        <button onclick="enterGame()" class="px-12 py-4 bg-orange-500 text-white text-xl rounded-2xl font-black shadow-[0_6px_0_rgb(194,65,12)] active:shadow-none active:translate-y-1 transition-all">
            点击开始游戏
        </button>
    </div>

    <div id="game-page" class="hidden-screen w-full max-w-md p-4">
        <div class="bg-white/60 p-4 rounded-2xl border-2 border-orange-200 mb-6 flex justify-between items-center">
            <div class="text-orange-900 font-bold text-lg">开启进度: <span id="count">0</span>/5</div>
            <div id="heart-status" class="flex gap-1 text-xl"></div>
        </div>

        <div id="grid-box" class="grid-container">
            </div>

        <div id="msg-bubble" class="mt-8 p-4 bg-white rounded-2xl border-4 border-orange-200 text-center font-bold text-orange-900 min-h-[80px] flex items-center justify-center opacity-0 transition-opacity duration-300">
            </div>
    </div>

    <div id="result-page" class="hidden-screen fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-6">
        <div id="result-card" class="w-full max-w-xs p-8 rounded-[2.5rem] border-8 border-white shadow-2xl text-center animate-in zoom-in duration-300">
            <div id="res-icon" class="text-6xl mb-4"></div>
            <h2 id="res-title" class="text-3xl font-black mb-4"></h2>
            <p id="res-text" class="text-lg font-bold leading-relaxed mb-8 text-gray-800"></p>
            <button onclick="location.reload()" class="w-full py-4 bg-white/90 hover:bg-white rounded-xl text-xl font-black shadow-lg transition-all active:scale-95">
                🔄 再来一把
            </button>
        </div>
    </div>

    <script>
        const LUCKY_LIST = ["锦鲤附体！刮刮乐中了1000块！", "职场飞升，跳槽薪资翻倍！", "口袋里发现了100块现金！", "一路绿灯，没排队就进了电梯！", "带薪摸鱼，老板出差一周！", "美食降临，想吃的餐厅不用排队！", "屏幕之光，暗恋对象发来晚安！", "灵感爆发，棘手工作10分钟搞定！", "降噪世界，邻居终于停止装修了！", "购物自由，宝贝突然打5折！", "社交救星，聚会突然取消了！", "体重惊喜，吃完火锅体重居然还掉了！", "快递神速，傍晚快递就敲门！", "清空红点，邮箱全是“收到辛苦了”！", "睡眠之神，自然醒发现是周六！", "记忆找回，想起断片密码了！", "专属温暖，下雨天有人为你撑伞！", "一把抽中SSR角色！", "饮料开盖再来一瓶！", "和闺蜜吐槽完心情大爽！"];
        const UNLUCKY_LIST = ["没带伞结果下大雨了！", "领导说方案不如第一版！", "临下班加10条需求！", "房租账单先到了！", "手机只剩1%电！", "路上认错人还拍了肩膀！", "奶茶外卖洒了！", "闹钟没响醒来10点！", "下一趟电梯要等5分钟！", "文档没保存蓝屏了！", "同事分零食破坏减肥！", "牙缝塞了菜叶！", "耳机线打成了死结！", "想起5年前一件糗事！", "差 1 秒没赶上公交！", "隔壁电钻装修！", "洗一半突然停水了！", "护肤品过敏脸肿了！", "连抽三个全是重复款！", "关键时刻WiFi断了！"];
        
        const COLORS = ['#F87171', '#FB923C', '#FBBF24', '#34D399', '#60A5FA', '#818CF8', '#A78BFA', '#F472B6'];
        let selections = [];

        function enterGame() {
            document.getElementById('cover-page').classList.add('hidden-screen');
            document.getElementById('game-page').classList.remove('hidden-screen');
            initGrid();
        }

        function initGrid() {
            const container = document.getElementById('grid-box');
            const hearts = document.getElementById('heart-status');
            container.innerHTML = '';
            hearts.innerHTML = Array(5).fill('<span style="opacity:0.2">🧡</span>').join('');

            // 合并并打乱 40 个事件
            const allEvents = [
                ...LUCKY_LIST.map(t => ({t, type:'lucky'})),
                ...UNLUCKY_LIST.map(t => ({t, type:'unlucky'}))
            ].sort(() => Math.random() - 0.5);

            allEvents.forEach((item) => {
                const el = document.createElement('div');
                const bgColor = COLORS[Math.floor(Math.random() * COLORS.length)];
                el.className = "pixel-card";
                el.style.backgroundColor = bgColor;
                el.onclick = () => flipCard(el, item);
                container.appendChild(el);
            });
        }

        function flipCard(el, item) {
            if (selections.length >= 5 || el.dataset.done) return;

            el.dataset.done = "true";
            el.style.backgroundColor = item.type === 'lucky' ? '#FDE047' : '#94A3B8';
            el.innerHTML = item.type === 'lucky' ? '✨' : '☁️';
            el.style.transform = "rotateY(180deg)";
            
            selections.push(item);
            document.getElementById('count').innerText = selections.length;
            
            const heartNodes = document.querySelectorAll('#heart-status span');
            heartNodes[selections.length - 1].style.opacity = "1";

            const bubble = document.getElementById('msg-bubble');
            bubble.style.opacity = "1";
            bubble.innerText = item.t;

            if (selections.length === 5) {
                setTimeout(showResult, 1000);
            }
        }

        function showResult() {
            const luckyCount = selections.filter(s => s.type === 'lucky').length;
            const unluckyCount = 5 - luckyCount;
            
            const page = document.getElementById('result-page');
            const card = document.getElementById('result-card');
            const icon = document.getElementById('res-icon');
            const title = document.getElementById('res-title');
            const text = document.getElementById('res-text');

            page.classList.remove('hidden-screen');

            if (luckyCount === 5) {
                card.className = "w-full max-w-xs p-8 rounded-[2.5rem] border-8 border-white shadow-2xl text-center bg-yellow-300";
                icon.innerText = "🏆";
                title.innerText = "好运爆表！";
                text.innerText = "娇祝你所有都一帆风顺，勇敢去做你想做的事吧。";
            } else if (luckyCount > unluckyCount) {
                card.className = "w-full max-w-xs p-8 rounded-[2.5rem] border-8 border-white shadow-2xl text-center bg-orange-100";
                icon.innerText = "☀️";
                title.innerText = "手气不错！";
                text.innerText = "哎呀，就差一点，那就祝你勇敢战胜困难，从此人生一片坦荡！";
            } else if (unluckyCount === 5) {
                card.className = "w-full max-w-xs p-8 rounded-[2.5rem] border-8 border-white shadow-2xl text-center bg-purple-200";
                icon.innerText = "🧸";
                title.innerText = "娇在护体！";
                text.innerText = "啊哦，上天今天好像没有眷顾你，但娇眷顾你，快去求安慰吧！";
            } else {
                card.className = "w-full max-w-xs p-8 rounded-[2.5rem] border-8 border-white shadow-2xl text-center bg-blue-100";
                icon.innerText = "🥤";
                title.innerText = "小小心情~";
                text.innerText = "有点小倒霉，但是没关系，洗个手再来一把吧！";
            }
        }
    </script>
</body>
</html>
